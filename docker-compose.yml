version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/app
  # ollama:
  #   image: ghcr.io/ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   depends_on:
  #     - backend
volumes:
  db_data:
